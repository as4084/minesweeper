<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window">

  <div class="header">
    <div class="title-bar">Minesweeper</div>

    <div class="panel">
      <div class="counter" id="mineCount">010</div>
      <button class="face" onclick="init()">😊</button>
      <div class="counter" id="timer">000</div>
    </div>

    <div class="difficulty">
      <button onclick="setLevel('easy')">初級</button>
      <button onclick="setLevel('medium')">中級</button>
      <button onclick="setLevel('hard')">上級</button>
    </div>
  </div>

  <div class="board-container">
    <div id="board"></div>
  </div>

  <div class="ranking">
    <h3>ランキング</h3>
    <ol id="rankingList"></ol>
  </div>

</div>

<script src="script.js"></script>
</body>
</html></body>
</html>
