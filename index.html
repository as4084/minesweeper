<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>
<style>
  body { font-family: sans-serif; text-align: center; }
  #board { display: inline-grid; gap: 2px; margin-top: 20px; }
  .cell {
    width: 30px; height: 30px;
    background: #ccc;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-weight: bold;
  }
  .open { background: #eee; cursor: default; }
  .mine { background: red; }
  .flag { background: yellow; }
</style>
</head>
<body>

<h2>マインスイーパー</h2>
<div id="board"></div>

<script>
const ROWS = 10;
const COLS = 10;
const MINES = 15;

let board = [];
let gameOver = false;

function init() {
  board = [];
  gameOver = false;
  const boardDiv = document.getElementById("board");
  boardDiv.style.gridTemplateColumns = `repeat(${COLS}, 30px)`;
  boardDiv.innerHTML = "";

  // セル作成
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      const cell = {
        mine: false,
        open: false,
        flag: false,
        count: 0,
        el: document.createElement("div")
      };

      cell.el.className = "cell";
      cell.el.oncontextmenu = (e) => {
        e.preventDefault();
        if (!cell.open) {
          cell.flag = !cell.flag;
          cell.el.classList.toggle("flag");
        }
      };

      cell.el.onclick = () => openCell(r, c);

      boardDiv.appendChild(cell.el);
      board[r][c] = cell;
    }
  }

  // 地雷配置
  let placed = 0;
  while (placed < MINES) {
    let r = Math.floor(Math.random() * ROWS);
    let c = Math.floor(Math.random() * COLS);
    if (!board[r][c].mine) {
      board[r][c].mine = true;
      placed++;
    }
  }

  // 数字計算
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c].mine) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          let nr = r + dr;
          let nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            if (board[nr][nc].mine) count++;
          }
        }
      }
      board[r][c].count = count;
    }
  }
}
